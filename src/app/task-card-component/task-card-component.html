<div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5 hover:shadow-md transition-shadow duration-200 flex flex-col justify-between h-full">

  <div class="flex items-center justify-between mb-3">
    @if (task.priority === 'High') {
      <span class="text-xs font-semibold px-2.5 py-1 rounded-full bg-red-50 text-red-600 border border-red-100">High</span>
    } @else if (task.priority === 'Medium') {
      <span class="text-xs font-semibold px-2.5 py-1 rounded-full bg-amber-50 text-amber-600 border border-amber-100">Medium</span>
    } @else {
      <span class="text-xs font-semibold px-2.5 py-1 rounded-full bg-green-50 text-green-600 border border-green-100">Low</span>
    }

    <span class="text-xs font-medium px-2 py-0.5 rounded text-gray-600 bg-gray-100">
      {{ task.status }}
    </span>
  </div>

  <div class="mb-4 flex-grow">
    <h4 class="text-base font-bold text-gray-900 line-clamp-2 capitalize" [title]="task.title">
      {{ task.title }}
    </h4>
  </div>

  <div class="border-t border-gray-100 my-3"></div>

  <div class="flex items-center justify-between text-xs text-gray-500">
    <div class="flex items-center gap-2">
      <div class="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center font-semibold text-[10px]">
        {{ task.assignee.substring(0, 2).toUpperCase() }}
      </div>
      <span class="font-medium text-gray-700">{{ task.assignee }}</span>
    </div>

    <div class="flex items-center gap-1">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
      <span>{{ task.dueDate }}</span>
    </div>
  </div>

</div>
